<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GuraDeals 🇩🇯</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="promo-banner">⚡️ Offre Spéciale : -20% ce weekend !</div>

    <header>
        <nav class="navbar">
            <div class="logo">Gura<span>Deals</span> 🇩🇯</div>
            <button id="theme-toggle"><i class="fas fa-moon"></i></button>
        </nav>
        
        <div class="search-box">
            <input type="text" placeholder="Rechercher...">
            <button><i class="fas fa-search"></i></button>
        </div>

        <div class="category-tabs">
            <button class="tab active">Tout</button>
            <button class="tab">High-Tech</button>
            <button class="tab">Mode</button>
            <button class="tab">Resto</button>
        </div>
    </header>

    <main class="container">
        <h2 class="section-title">🔥 Bons Plans</h2>
        <div class="product-grid">
            <div class="product-card">
                <div class="offer-badge">-50%</div>
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
                <div class="p-info">
                    <span class="shop">Asli Shop</span>
                    <h3>Nike Air Max Pro</h3>
                    <span class="price-now">12,000 FDJ</span>
                    <span class="price-old">24,000 FDJ</span>
                    <button class="order-btn"><i class="fab fa-whatsapp"></i> Acheter</button>
                </div>
            </div>
            <div class="product-card">
                <div class="offer-badge">NEW</div>
                <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
                <div class="p-info">
                    <span class="shop">Djib-Store</span>
                    <h3>iPhone 15 Pro</h3>
                    <span class="price-now">185,000 FDJ</span>
                    <button class="order-btn"><i class="fab fa-whatsapp"></i> Acheter</button>
                </div>
            </div>
        </div>
    </main>

    <div class="bottom-bar">
        <div class="nav-item active"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item"><i class="fas fa-heart"></i><span>Favoris</span></div>
        <div class="nav-item plus-btn"><i class="fas fa-plus-circle"></i></div>
        <div class="nav-item"><i class="fas fa-search"></i><span>Explorer</span></div>
        <div class="nav-item"><i class="fas fa-user"></i><span>Profil</span></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
